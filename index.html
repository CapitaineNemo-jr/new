<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅行プランナー</title>
  <meta name="theme-color" content="#38bdf8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
 
  <style>
    :root {
      --c-bg:        #f0f4f8;
      --c-surface:   #ffffff;
      --c-border:    #e2e8f0;
      --c-text:      #1e293b;
      --c-muted:     #64748b;
      --c-primary:   #0ea5e9;
      --c-primary-d: #0284c7;
      --c-green:     #10b981;
      --c-red:       #ef4444;
      --c-orange:    #f59e0b;
      --c-yellow-bg: #fefce8;
      --radius-sm:   6px;
      --radius-md:   12px;
      --radius-lg:   18px;
      --shadow-sm:   0 1px 3px rgba(0,0,0,.08);
      --shadow-md:   0 4px 12px rgba(0,0,0,.10);
      --shadow-lg:   0 8px 24px rgba(0,0,0,.14);
      --font:        'Noto Sans JP', sans-serif;
    }
    
    /* ===== ダークモード対応 ===== */
    @media (prefers-color-scheme: dark) {
      :root {
        --c-bg:        #0f172a;
        --c-surface:   #1e293b;
        --c-border:    #334155;
        --c-text:      #f8fafc;
        --c-muted:     #94a3b8;
        --c-yellow-bg: #1e1b4b;
      }
      .guide-card, .split-member-row:hover, .dropdown-menu div:hover { background: #334155 !important; }
      .login-card, .reset-card, .modal-content { background: #1e293b !important; color: var(--c-text); }
      input[type="text"], input[type="password"], input[type="time"], input[type="number"], input[type="datetime-local"], input[type="date"], select {
        background: #1e293b !important; color: #f8fafc !important;
      }
      .settlement-route { background: #334155 !important; }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--c-bg);
      color: var(--c-text);
      display: flex;
      justify-content: center;
      min-height: 100dvh;
    }
    a { color: var(--c-primary); }
    .app-shell {
      width: 100%;
      max-width: 480px;
      min-height: 100dvh;
      background: var(--c-surface);
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow: var(--shadow-lg);
    }
    .screen { display: none; flex-direction: column; flex: 1; height: 100dvh; }
    .screen.active { display: flex; }
    .loading-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.4);
      backdrop-filter: blur(3px);
      display: none; justify-content: center; align-items: center;
      z-index: 200; flex-direction: column; gap: 12px;
    }
    .loading-overlay.active { display: flex; }
    .spinner {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid var(--c-border);
      border-top-color: var(--c-primary);
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 13px; color: #fff; }
    #toast-container {
      position: fixed; bottom: 80px; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; gap: 8px;
      z-index: 300; pointer-events: none;
      width: min(90%, 400px);
    }
    .toast {
      padding: 12px 16px; border-radius: var(--radius-md);
      font-size: 14px; font-weight: 500;
      box-shadow: var(--shadow-md);
      animation: toastIn .25s ease forwards;
      pointer-events: all;
    }
    .toast.success { background: #dcfce7; color: #166534; border-left: 4px solid var(--c-green); }
    .toast.error   { background: #fee2e2; color: #991b1b; border-left: 4px solid var(--c-red); }
    .toast.info    { background: #e0f2fe; color: #0c4a6e; border-left: 4px solid var(--c-primary); }
    .toast.warning { background: #fef9c3; color: #713f12; border-left: 4px solid var(--c-orange); }
    .toast.fade-out { animation: toastOut .3s ease forwards; }
    @keyframes toastIn  { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes toastOut { to   { opacity:0; transform:translateY(10px); } }
    .form-label { font-size: 12px; color: var(--c-muted); font-weight: 500; display: block; margin-bottom: 4px; }
    .form-group { margin-bottom: 14px; }
    input[type="text"], input[type="password"], input[type="time"], input[type="number"], input[type="datetime-local"], input[type="date"], select {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid var(--c-border);
      border-radius: var(--radius-sm);
      font-size: 15px; font-family: var(--font);
      background: var(--c-surface); color: var(--c-text);
      outline: none; transition: border-color .15s;
    }
    input:focus, select:focus { border-color: var(--c-primary); }
    .btn {
      display: inline-flex; justify-content: center; align-items: center; gap: 6px;
      padding: 11px 18px; border: none; border-radius: var(--radius-sm);
      font-size: 15px; font-family: var(--font); font-weight: 600;
      cursor: pointer; transition: filter .15s, transform .1s;
      text-decoration: none; white-space: nowrap;
    }
    .btn:active { transform: scale(.97); }
    .btn:hover  { filter: brightness(1.07); }
    .btn-primary  { background: var(--c-primary);  color: #fff; width: 100%; }
    .btn-success  { background: var(--c-green);    color: #fff; width: 100%; }
    .btn-danger   { background: var(--c-red);      color: #fff; }
    .btn-neutral  { background: #94a3b8;            color: #fff; width: 100%; }
    .btn-outline-danger {
      background: transparent; color: var(--c-red);
      border: 1.5px solid var(--c-red);
      padding: 4px 10px; font-size: 12px; border-radius: var(--radius-sm);
    }
    .btn-ghost  {
      background: none; border: none; color: var(--c-muted);
      padding: 4px 8px; font-size: 20px; cursor: pointer; width: auto;
    }
    .btn-sm { padding: 5px 12px; font-size: 12px; width: auto; }
    .btn-fab {
      position: absolute; right: 18px; bottom: 76px;
      width: 54px; height: 54px; border-radius: 50%;
      background: var(--c-primary); color: #fff;
      border: none; font-size: 26px; cursor: pointer;
      box-shadow: 0 4px 14px rgba(14,165,233,.45);
      display: flex; justify-content: center; align-items: center;
      z-index: 10; transition: transform .15s, box-shadow .15s;
    }
    .btn-fab:hover  { transform: scale(1.08); box-shadow: 0 6px 20px rgba(14,165,233,.55); }
    .btn-fab:active { transform: scale(.95); }
    .btn-row { display: flex; gap: 8px; }
    .btn-row .btn { flex: 1; }
    .modal {
      display: none; position: absolute; inset: 0;
      background: rgba(15,23,42,.5); backdrop-filter: blur(2px);
      justify-content: center; align-items: center; z-index: 100;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: var(--c-surface); border-radius: var(--radius-lg);
      padding: 22px; width: 88%; max-height: 85dvh; overflow-y: auto;
      box-shadow: var(--shadow-lg);
    }
    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
    #screen-login {
      justify-content: center; padding: 32px 24px;
      background: linear-gradient(160deg, #0ea5e9 0%, #0f172a 100%);
    }
    .login-card {
      background: #fff; border-radius: var(--radius-lg);
      padding: 28px 22px; box-shadow: var(--shadow-lg); color: #1e293b;
    }
    .login-logo { text-align: center; margin-bottom: 20px; }
    .login-logo .icon { font-size: 42px; }
    .login-logo h1 { font-size: 22px; font-weight: 700; color: var(--c-text); margin-top: 6px; }
    .forgot-link { font-size: 12px; color: var(--c-primary); text-align: right; cursor: pointer; margin-bottom: 4px; }
    #screen-group { overflow: hidden; }
    .group-header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--c-border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .group-header h2 { font-size: 20px; font-weight: 700; }
    .user-chip { display: flex; align-items: center; gap: 8px; }
    .user-chip span { font-size: 13px; color: var(--c-muted); }
    .group-list { flex: 1; overflow-y: auto; padding: 12px 16px 80px; }
    
    /* ===== グループ一覧カバーデザイン拡張 ===== */
    .group-item {
      background: var(--c-surface); border: 1px solid var(--c-border);
      border-radius: var(--radius-md); margin-bottom: 12px;
      display: flex; flex-direction: column; box-shadow: var(--shadow-sm);
      transition: box-shadow .15s; overflow: hidden; position: relative;
    }
    .group-item:hover { box-shadow: var(--shadow-md); }
    .group-cover { height: 60px; display: flex; align-items: center; padding: 0 16px; font-size: 24px; font-weight: bold; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
    .group-item-body { flex: 1; cursor: pointer; padding: 12px 16px; word-break: break-all; }
    .group-item-name { font-weight: 700; font-size: 16px; }
    .group-item-meta { font-size: 12px; color: var(--c-muted); margin-top: 2px; }
    .group-item .menu-container { position: absolute; right: 8px; bottom: 8px; }

    /* カラー＆イメージ選択パネル */
    .color-picker-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin-top: 6px; }
    .color-dot { height: 30px; border-radius: var(--radius-sm); cursor: pointer; border: 2px solid transparent; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .color-dot.selected { border-color: var(--c-text); }

    .guide-card {
      text-align: center; background: #f8fafc;
      border: 2px dashed var(--c-border); border-radius: var(--radius-lg);
      padding: 32px 20px; margin-top: 24px; color: var(--c-muted);
    }
    .guide-icon { font-size: 42px; margin-bottom: 12px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
    .guide-title { font-weight: 700; font-size: 16px; color: var(--c-text); margin-bottom: 8px; }
    .guide-desc  { font-size: 13px; line-height: 1.7; }
    #screen-main { overflow: hidden; }
    .main-header {
      padding: 12px 16px; border-bottom: 1px solid var(--c-border);
      display: flex; justify-content: center; align-items: center; position: relative;
      min-height: 52px;
    }
    .back-btn {
      position: absolute; left: 12px;
      font-size: 13px; color: var(--c-primary); cursor: pointer;
      padding: 4px 6px;
    }
    .header-title-wrap { display: flex; align-items: center; gap: 2px; }
    .header-title-wrap h3 { font-size: 17px; font-weight: 700; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .main-content { flex: 1; overflow-y: auto; padding: 12px 16px 80px; position: relative; }
    .tab-bar {
      display: flex; border-top: 1px solid var(--c-border);
      background: var(--c-surface);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .tab-item {
      flex: 1; text-align: center; padding: 14px 0;
      cursor: pointer; font-size: 13px; color: var(--c-muted);
      transition: color .15s, border-top .15s;
      border-top: 3px solid transparent;
    }
    .tab-item.active {
      color: var(--c-primary); font-weight: 700;
      border-top-color: var(--c-primary);
    }
    .tab-icon { font-size: 16px; display: block; margin-bottom: 2px; }
    .list-item {
      background: var(--c-surface); border: 1px solid var(--c-border);
      border-radius: var(--radius-md); padding: 12px 14px;
      margin-bottom: 8px; display: flex; align-items: center; gap: 10px;
      border-left: 4px solid var(--c-primary); box-shadow: var(--shadow-sm);
    }
    .item-data { flex: 1; font-size: 14px; word-break: break-all; }
    .day-header {
      background: #1e293b; color: #fff;
      padding: 5px 12px; border-radius: var(--radius-sm);
      font-size: 12px; font-weight: 700; margin: 16px 0 8px;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .calendar-view { margin-bottom: 12px; }
    .cal-day-block {
      background: var(--c-bg); border: 1px solid var(--c-border);
      border-radius: var(--radius-md); margin-bottom: 12px; overflow: hidden;
    }
    .cal-day-header {
      background: linear-gradient(90deg, var(--c-primary) 0%, var(--c-primary-d) 100%);
      color: #fff; padding: 8px 14px;
      font-size: 13px; font-weight: 700;
    }
    .cal-events { padding: 8px 12px; }
    
    /* ===== しおりのカテゴリ色分けスタイル ===== */
    .cal-event-row {
      display: flex; gap: 10px; align-items: flex-start;
      padding: 8px 10px; border-radius: var(--radius-sm);
      margin-bottom: 6px; border-left: 4px solid transparent;
      background: var(--c-surface); box-shadow: var(--shadow-sm);
    }
    .cal-event-row.shiori-cat-move  { border-left-color: #3b82f6; background: rgba(59,130,246,0.05); }
    .cal-event-row.shiori-cat-food  { border-left-color: #ef4444; background: rgba(239,68,68,0.05); }
    .cal-event-row.shiori-cat-sight { border-left-color: #10b981; background: rgba(16,185,129,0.05); }
    .cal-event-row.shiori-cat-stay  { border-left-color: #a855f7; background: rgba(168,85,247,0.05); }
    
    .cal-event-time { font-size: 12px; font-weight: 700; color: var(--c-primary); min-width: 40px; padding-top: 1px; }
    .cal-event-text { flex: 1; font-size: 14px; }
    .cal-event-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .cal-event-btn {
      background: none; border: none; font-size: 13px; cursor: pointer;
      color: var(--c-muted); padding: 2px 4px; border-radius: 4px;
    }
    .btn-like {
      background: var(--c-surface); color: #94a3b8;
      border: 1.5px solid var(--c-border);
      padding: 5px 0; font-size: 13px;
      border-radius: 20px; width: 54px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; gap: 3px;
      cursor: pointer; transition: all .15s;
    }
    .btn-like.liked  { background: #fff1f2; color: #f43f5e; border-color: #fecdd3; font-weight: 700; }
    .spot-map-btn {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; color: var(--c-primary); text-decoration: none;
      background: rgba(14,165,233,0.1); padding: 3px 8px; border-radius: 20px; margin-top: 4px;
    }
    .money-summary {
      background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
      color: #fff; border-radius: var(--radius-md);
      padding: 16px; margin-bottom: 14px;
    }
    .money-summary-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
    .money-summary-total { font-size: 22px; font-weight: 700; }
    .money-member-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px;
    }
    .money-member-card {
      background: var(--c-surface); border: 1px solid var(--c-border);
      border-radius: var(--radius-sm); padding: 10px 12px; box-shadow: var(--shadow-sm);
    }
    .money-member-name { font-size: 12px; color: var(--c-muted); margin-bottom: 2px; display: flex; align-items: center; gap: 4px; }
    .money-member-paid { font-size: 14px; font-weight: 700; }
    .money-member-diff { font-size: 12px; font-weight: 700; margin-top: 2px; }
    .diff-positive { color: var(--c-green); }
    .diff-negative { color: var(--c-red); }
    .settlement-graph {
      background: var(--c-surface); border: 1px solid var(--c-border);
      border-radius: var(--radius-md); padding: 14px; margin-bottom: 14px;
    }
    .settlement-graph-title { font-size: 13px; font-weight: 700; margin-bottom: 10px; color: var(--c-text); }
    
    /* ===== ビジュアル清算フロー表示拡張 ===== */
    .settlement-route {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; background: #f8fafc;
      border-radius: var(--radius-md); margin-bottom: 8px;
      box-shadow: var(--shadow-sm);
    }
    .settlement-user-badge { display: inline-flex; align-items: center; gap: 6px; font-weight: 700; font-size: 13px; padding: 4px 8px; border-radius: 20px; color: #fff; }
    .settlement-arrow-visual { position: relative; flex: 1; display: flex; align-items: center; justify-content: center; margin: 0 10px; color: var(--c-primary); font-weight: bold; }
    .settlement-arrow-visual::before { content: ''; position: absolute; left: 0; right: 4px; height: 2px; background: currentColor; z-index: 1; }
    .settlement-arrow-visual::after { content: ''; position: absolute; right: -2px; font-size: 10px; z-index: 1; }
    .settlement-amount { font-size: 15px; font-weight: 700; color: #0284c7; white-space: nowrap; }
    
    /* メンバーカラー用カラーバッジスタイル */
    .color-badge { width: 12px; height: 12px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    
    .menu-container { position: relative; }
    .dropdown-menu {
      display: none; position: absolute; right: 0; top: 28px;
      background: var(--c-surface); border: 1px solid var(--c-border);
      border-radius: var(--radius-sm); box-shadow: var(--shadow-md);
      z-index: 50; min-width: 90px; overflow: hidden;
    }
    .dropdown-menu.show { display: block; }
    .dropdown-menu div {
      padding: 9px 14px; font-size: 13px; cursor: pointer; transition: background .1s;
    }
    .dropdown-menu div:hover { background: var(--c-bg); }
    .menu-delete { color: var(--c-red); }
    .poll-card {
      background: var(--c-surface); border: 1px solid var(--c-border);
      border-radius: var(--radius-md); padding: 16px;
      margin-bottom: 14px; border-top: 4px solid var(--c-primary);
    }
    .poll-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .poll-desc  { font-size: 12px; color: var(--c-muted); margin-bottom: 12px; }
    .poll-deadline { font-size: 12px; font-weight: 700; margin-bottom: 12px; }
    .poll-deadline.expired { color: var(--c-red); }
    .poll-deadline.active  { color: var(--c-green); }
    .poll-deadline.none    { color: var(--c-muted); }
    .poll-option {
      background: var(--c-bg); border: 1.5px solid var(--c-border);
      border-radius: var(--radius-sm); padding: 10px 12px;
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px; gap: 8px;
    }
    .poll-option.voted { border-color: var(--c-green); background: rgba(16,185,129,0.05); }
    .poll-option-info { flex: 1; }
    .poll-option-name  { font-size: 14px; font-weight: 600; word-break: break-all; }
    .poll-option-votes { font-size: 12px; color: var(--c-primary); font-weight: 700; margin-top: 2px; }
    .poll-option-bar {
      height: 4px; background: var(--c-border); border-radius: 2px; margin-top: 6px; overflow: hidden;
    }
    .poll-option-bar-fill { height: 100%; background: var(--c-primary); border-radius: 2px; transition: width .4s; }
    .poll-option-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .poll-section-label { font-size: 11px; font-weight: 700; color: var(--c-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .05em; }
    .poll-row { display: flex; gap: 6px; margin-bottom: 10px; }
    .poll-row input { flex: 1; margin: 0; }
    .poll-separator { border: none; border-top: 1px dashed var(--c-border); margin: 14px 0; }
    .status-bar {
      display: flex; gap: 8px; background: var(--c-surface);
      border: 1px solid var(--c-border); border-radius: var(--radius-md);
      padding: 10px; margin-bottom: 14px; box-shadow: var(--shadow-sm);
    }
    .status-cell { flex: 1; text-align: center; }
    .status-cell-label { font-size: 11px; color: var(--c-muted); }
    .status-cell-value { font-size: 12px; font-weight: 700; margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .status-active   { color: var(--c-primary); }
    .status-waiting  { color: var(--c-muted); }
    .status-done     { color: var(--c-green); }
    .status-divider  { width: 1px; background: var(--c-border); margin: 2px 0; }
    .confirmed-banner {
      background: rgba(14,165,233,0.1); border: 1px solid var(--c-border);
      border-left: 4px solid var(--c-primary); border-radius: var(--radius-sm);
      padding: 10px 12px; font-size: 12px; margin-bottom: 10px;
      display: flex; justify-content: space-between; align-items: center; gap: 8px;
    }
    .member-tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
    .member-tag {
      background: var(--c-bg); padding: 4px 10px; border-radius: 20px;
      font-size: 13px; display: flex; align-items: center; gap: 5px;
    }
    .btn-del-member {
      background: none; border: none; color: var(--c-red); cursor: pointer;
      font-size: 14px; line-height: 1; padding: 0;
    }
    #screen-reset {
      justify-content: center; padding: 32px 24px;
      background: linear-gradient(160deg, #0ea5e9 0%, #0f172a 100%);
    }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--c-muted); font-size: 13px; }
    .mt-8  { margin-top: 8px; }
    .mt-12 { margin-top: 12px; }
    .mt-16 { margin-top: 16px; }
    .divider { border: none; border-top: 1px solid var(--c-border); margin: 16px 0; }

    .split-mode-toggle {
      display: flex; gap: 0; margin-bottom: 12px;
      border: 1.5px solid var(--c-border); border-radius: var(--radius-sm); overflow: hidden;
    }
    .split-mode-btn {
      flex: 1; padding: 9px 6px; border: none; background: var(--c-bg);

    .split-member-list { border: 1.5px solid var(--c-border); border-radius: var(--radius-sm); overflow: hidden; margin-bottom: 8px; }

    .split-manual-row input[type="number"] { flex: 1; padding: 8px 10px; font-size: 14px; border: 1.5px solid var(--c-border); border-radius: var(--radius-sm); width: auto; }
    .split-manual-total { background: rgba(16,185,129,0.05); border: 1px solid var(--c-border); border-radius: var(--radius-sm); padding: 8px 12px; font-size: 13px; margin-top: 4px; display: flex; justify-content: space-between; }
    .split-manual-total .total-ok  { color: var(--c-green); font-weight: 700; }
    .split-manual-total .total-ng  { color: var(--c-red); font-weight: 700; }

    .split-detail-badge { display: inline-flex; align-items: center; gap: 3px; background: rgba(14,165,233,0.1); border-radius: 20px; padding: 2px 8px; font-size: 11px; margin: 2px 2px 0 0; }

</head>

<script type="module">
import { initializeApp }         from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { getFirestore, doc, setDoc, getDoc, updateDoc, deleteDoc, collection, query, where, onSnapshot, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
 
const firebaseConfig = {
  apiKey: "AIzaSyC_tErN9-D_rd_d4Aqtj8Z7l85rh2voLHk",
  authDomain: "togeritan.firebaseapp.com",
  projectId: "togeritan",
  storageBucket: "togeritan.firebasestorage.app",
  messagingSenderId: "604693733583",
  appId: "1:604693733583:web:884e3cc3e577f551ebd7ba",
  measurementId: "G-7VX5BM6XJ0"
};
 
const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);
 
let myUID          = "";
let loginUserName  = "";
let currentGroupId = "";
let currentTab     = "しおり";
let createTempMembers = [];
let tempMembers    = {};
let tempMemberColors = {}; // メンバーカラー保持用
let currentGroupData = null;
let groupListUnsubscribe  = null;
let activeGroupUnsubscribe = null;
let splitMode = 'even';
 
// 12色のカラーパレット定義
const COLOR_PALETTE = [
  { name: '赤', hex: '#ef4444', emoji: '' }, { name: '青', hex: '#3b82f6', emoji: '' },
  { name: '緑', hex: '#10b981', emoji: '' }, { name: '黄', hex: '#f59e0b', emoji: '' },
  { name: '紫', hex: '#a855f7', emoji: '' }, { name: '桃', hex: '#f43f5e', emoji: '' },
  { name: '橙', hex: '#f97316', emoji: '' }, { name: '水色', hex: '#06b6d4', emoji: '' },
  { name: 'ライム', hex: '#84cc16', emoji: '' }, { name: 'インディゴ', hex: '#6366f1', emoji: '' },
  { name: 'ローズ', hex: '#fda4af', emoji: '' }, { name: 'グレー', hex: '#64748b', emoji: '' }
];

let selectedGroupCover = COLOR_PALETTE[1]; // デファルト青

const urlParams    = new URLSearchParams(window.location.search);
const inviteGroupId = urlParams.get('join');

/* ===== PWA manifest ===== */
(function injectManifest() {
  const manifest = {
    name: "旅行プランナー", short_name: "旅プラン",
    description: "グループで一緒に旅行計画を立てるアプリ",
    start_url: "./", display: "standalone",
    background_color: "#0f172a", theme_color: "#38bdf8", orientation: "portrait",
    icons: [
      { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='36' fill='%230ea5e9'/%3E%3Ctext x='96' y='130' font-size='110' text-anchor='middle'%3E%3C/text%3E%3C/svg%3E", sizes: "192x192", type: "image/svg+xml", purpose: "any maskable" },
      { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='96' fill='%230ea5e9'/%3E%3Ctext x='256' y='350' font-size='300' text-anchor='middle'%3E%3C/text%3E%3C/svg%3E", sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
  const link = document.createElement('link');
  link.rel = 'manifest'; link.href = URL.createObjectURL(blob);
  document.head.appendChild(link);
})();

/* ===================================================
    ユーティリティ
=================================================== */
function showLoading(show) { document.getElementById('loading').classList.toggle('active', show); }
function showToast(message, type = 'info', duration = 3000) {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast ${type}`; el.textContent = message;
  container.appendChild(el);
  setTimeout(() => { el.classList.add('fade-out'); el.addEventListener('animationend', () => el.remove()); }, duration);
}
function navigateTo(screenId) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(screenId).classList.add('active'); closeAllMenus(); }
function closeAllMenus() { document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show')); }
function escapeHtml(str) { if (str == null) return ''; return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ===================================================
    認証
=================================================== */
onAuthStateChanged(auth, async (user) => {
  showLoading(true);
  if (user) {
    myUID = user.uid;
    const userDoc = await getDoc(doc(db, "users", myUID));
    if (userDoc.exists()) {
      loginUserName = userDoc.data().name;
      document.getElementById('txt-user-status').textContent = `${loginUserName} さん`;
      if (inviteGroupId) await joinGroupViaLink(inviteGroupId); else goToGroupScreen();
    } else { navigateTo('screen-setup-name'); showLoading(false); }
  } else {
    myUID = loginUserName = "";
    if (groupListUnsubscribe)   { groupListUnsubscribe();   groupListUnsubscribe   = null; }
    if (activeGroupUnsubscribe) { activeGroupUnsubscribe(); activeGroupUnsubscribe = null; }
    navigateTo('screen-login'); showLoading(false);
  }
});

document.getElementById('btn-login').addEventListener('click', async () => {
  const email    = document.getElementById('input-login-email').value.trim();
  const password = document.getElementById('input-login-password').value;
  if (!email || !password) return showToast("メールアドレスとパスワードを入力してください", "warning");
  showLoading(true);
  try { await signInWithEmailAndPassword(auth, email, password); } catch (err) { showToast("ログインに失敗しました", "error"); showLoading(false); }
});
document.getElementById('btn-go-register').addEventListener('click', () => navigateTo('screen-register'));
document.getElementById('btn-back-to-login-from-register').addEventListener('click', () => navigateTo('screen-login'));
document.getElementById('btn-register').addEventListener('click', async () => {
  const email = document.getElementById('input-reg-email').value.trim();
  const pw    = document.getElementById('input-reg-password').value;
  const pw2   = document.getElementById('input-reg-password2').value;
  if (!email || !pw) return showToast("メールアドレスを入力してください", "warning");
  if (pw !== pw2) return showToast("パスワードが一致しません", "warning");
  showLoading(true);
  try { await createUserWithEmailAndPassword(auth, email, pw); } catch (err) { showToast("作成に失敗しました", "error"); showLoading(false); }
});

function goToGroupScreen() { navigateTo('screen-group'); syncGroupList(); buildCoverPickers(); }

// カバー・カラーピッカー要素生成
function buildCoverPickers() {
  ['create-group-color-picker', 'edit-group-color-picker'].forEach(id => {
    const cp = document.getElementById(id);
    cp.innerHTML = '';
    COLOR_PALETTE.forEach(c => {
      const dot = document.createElement('div');
      dot.className = 'color-dot';
      dot.style.backgroundColor = c.hex;
      dot.innerText = c.emoji;
      dot.dataset.hex = c.hex;
      dot.dataset.emoji = c.emoji;
      dot.addEventListener('click', () => {
        cp.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
        dot.classList.add('selected');
        selectedGroupCover = c;
      });
      cp.appendChild(dot);
    });
    cp.firstChild?.click();
  });
}

function syncGroupList() {
  if (groupListUnsubscribe) groupListUnsubscribe();
  showLoading(true);
  const q = query(collection(db, "groups"), where("members", "array-contains", myUID));
  groupListUnsubscribe = onSnapshot(q, (snapshot) => {
    const container = document.getElementById('group-container');
    container.innerHTML = '';
    if (snapshot.empty) {
      container.innerHTML = `<div class="guide-card"><div class="guide-icon"></div><div class="guide-title">旅の計画をはじめよう！</div></div>`;
      showLoading(false); return;
    }
    snapshot.forEach((docSnap) => {
      const data = docSnap.data();
      const gid  = docSnap.id;
      const cover = data.cover || { hex: '#0ea5e9', emoji: '' };
      const div  = document.createElement('div');
      div.className = 'group-item';
      div.innerHTML = `
        <div class="group-cover" style="background-color: ${cover.hex}">${cover.emoji}</div>
        <div class="group-item-body" data-gid="${gid}" data-gname="${escapeHtml(data.name)}">
          <div class="group-item-name">${escapeHtml(data.name)}</div>
          <div class="group-item-meta"> ${Object.keys(data.memberNames || {}).length}人のメンバー</div>
        </div>
        <div class="menu-container">
          <button class="btn-ghost" data-menu="${gid}">⋮</button>
          <div class="dropdown-menu" id="menu-${gid}">
            <div data-action="edit-group" data-gid="${gid}" data-gname="${escapeHtml(data.name)}">編集</div>
            <div class="menu-delete" data-action="delete-group" data-gid="${gid}">削除</div>
          </div>
        </div>`;
      container.appendChild(div);
    });
    showLoading(false);
  });
}

document.getElementById('group-container').addEventListener('click', (e) => {
  const body    = e.target.closest('.group-item-body');
  const menuBtn = e.target.closest('[data-menu]');
  const action  = e.target.closest('[data-action]');
  if (body) openGroup(body.dataset.gid, body.dataset.gname);
  if (menuBtn) { e.stopPropagation(); const m = document.getElementById(`menu-${menuBtn.dataset.menu}`); const open = m.classList.contains('show'); closeAllMenus(); if(!open) m.classList.add('show'); }
  if (action)  {
    e.stopPropagation();
    if (action.dataset.action === 'edit-group') openGroupEditModal(action.dataset.gid, action.dataset.gname);
    if (action.dataset.action === 'delete-group') deleteGroup(action.dataset.gid);
  }
});

function switchTab(tabName) {
  currentTab = tabName; closeAllMenus();
  ['しおり','行き先','お金'].forEach((name, i) => {
    const el = document.getElementById(['tab-shiori','tab-yukisaki','tab-okane'][i]);
    el.classList.toggle('active', name === tabName);
  });
  renderContent();
}

function renderContent() {
  const container = document.getElementById('main-content-area'); container.innerHTML = "";
  if (!currentGroupData) return;
  if (currentTab === 'しおり')    renderShiori(container);
  else if (currentTab === '行き先') renderYukisaki(container);
  else if (currentTab === 'お金')  renderOkane(container);
}

/* ===================================================
    しおりレンダリング (カテゴリ・カラー対応)
=================================================== */
function renderShiori(container) {
  const list = [...(currentGroupData.shiori || [])].sort((a,b) => {
    const da = a.day || "1", db2 = b.day || "1";
    return da !== db2 ? da.localeCompare(db2) : a.time.localeCompare(b.time);
  });
  if (list.length === 0) { container.innerHTML = '<div class="empty-state"> スケジュールを追加しよう！</div>'; return; }
  const days = {};
  list.forEach(item => { const d = item.day || "1"; if (!days[d]) days[d] = []; days[d].push(item); });
  
  const calDiv = document.createElement('div'); calDiv.className = 'calendar-view';
  Object.keys(days).sort().forEach(day => {
    const block = document.createElement('div'); block.className = 'cal-day-block';
    block.innerHTML = `<div class="cal-day-header"> ${day}日目</div><div class="cal-events" id="cal-events-${day}"></div>`;
    calDiv.appendChild(block);
    const eventsDiv = block.querySelector(`#cal-events-${day}`);
    
    days[day].forEach(item => {
      const row = document.createElement('div');
      // カテゴリごとにクラスを付与
      const catClass = item.cat ? `shiori-cat-${item.cat}` : '';
      row.className = `cal-event-row ${catClass}`;
      row.innerHTML = `
        <span class="cal-event-time">${escapeHtml(item.time)}</span>
        <span class="cal-event-text">${escapeHtml(item.text)}</span>
        <div class="cal-event-actions">
          <button class="cal-event-btn" data-action="edit" data-id="${item.id}"></button>
          <button class="cal-event-btn" data-action="delete" data-id="${item.id}"></button>
        </div>`;
      eventsDiv.appendChild(row);
    });
  });
  calDiv.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-action]'); if (!btn) return; e.stopPropagation();
    if (btn.dataset.action === 'edit') openEditItem(btn.dataset.id);
    if (btn.dataset.action === 'delete') deleteItem(btn.dataset.id);
  });
  container.appendChild(calDiv);
}

    <div class="status-divider"></div>

  } else if (!destinationPoll.finalValue) {
    container.appendChild(buildConfirmedBanner(`日程: ${datePoll.finalValue} / 予算: ${budgetPoll.finalValue}`, () => resetStep('budget')));
    container.appendChild(buildPollCard('destination', 'Step 3: 目的地を決めよう！', '行きたい場所を投票しましょう！', destinationPoll, '例: 北海道、沖縄'));

        <div class="item-data"><strong>${escapeHtml(item.name)}</strong></div>

/* ===================================================
    お金レンダリング (日付ソート・アイコン・ビジュアル矢印)
=================================================== */
function renderOkane(container) {
  const memberIds = Object.keys(currentGroupData.memberNames || {});
  // ===== 支払い履歴を日付順（古いものから新しいもの順）に並べ替え =====
  const okaneList = [...(currentGroupData.flatMapOkane || currentGroupData.okane || [])].sort((a, b) => {
    const dateA = a.date || "0000-00-00";
    const dateB = b.date || "0000-00-00";
    return dateA.localeCompare(dateB);
  });
  
  const colors = currentGroupData.memberColors || {};
  let total = 0;
  const memberPaid = {}, memberOwes = {};
  memberIds.forEach(id => { memberPaid[id] = 0; memberOwes[id] = 0; });

  okaneList.forEach(e => {
    total += e.amount;
    if (memberPaid[e.uid] !== undefined) memberPaid[e.uid] += e.amount;
    if (e.splits && Object.keys(e.splits).length > 0) {
      Object.entries(e.splits).forEach(([uid, amt]) => { if (memberOwes[uid] !== undefined) memberOwes[uid] += amt; });
    } else {
      const share = Math.round(e.amount / (memberIds.length || 1));
      memberIds.forEach(id => { memberOwes[id] += share; });
    }
  });

  const diffMap = {}; memberIds.forEach(id => diffMap[id] = memberPaid[id] - memberOwes[id]);
  
  // サマリー表示
  const summaryDiv = document.createElement('div'); summaryDiv.className = 'money-summary';
  summaryDiv.innerHTML = `<div class="money-summary-row"><span>合計支出</span><span>1人平均</span></div><div class="money-summary-row"><span class="money-summary-total">¥${total.toLocaleString()}</span><span class="money-summary-total">¥${Math.round(total/(memberIds.length||1)).toLocaleString()}</span></div>`;
  container.appendChild(summaryDiv);

  // メンバー別グリッドカード（カラーバッジ対応）
  const grid = document.createElement('div'); grid.className = 'money-member-grid';
  memberIds.forEach(id => {
    const name = currentGroupData.memberNames[id] || "不明";
    const userColor = colors[id] || '#cbd5e1';
    const diff = diffMap[id];
    const card = document.createElement('div'); card.className = 'money-member-card';
    card.innerHTML = `
      <div class="money-member-name"><span class="color-badge" style="background-color: ${userColor}"></span>${escapeHtml(name)}</div>
      <div class="money-member-paid">¥${memberPaid[id].toLocaleString()}</div>
      <div class="money-member-diff ${diff >= 0 ? 'diff-positive' : 'diff-negative'}">${diff >= 0 ? `+¥${diff.toLocaleString()}` : `-¥${Math.abs(diff).toLocaleString()}`}</div>`;
    grid.appendChild(card);
  });
  container.appendChild(grid);

  // ===== ビジュアル清算フロー =====
  const routes = calculateSettlementRoutes(diffMap, currentGroupData.memberNames || {});
  if (routes.length > 0) {
    const graphDiv = document.createElement('div'); graphDiv.className = 'settlement-graph';
    graphDiv.innerHTML = `<div class="settlement-graph-title"> 精算フロー</div>`;
    routes.forEach(r => {
      const fromColor = colors[r.fromId] || '#64748b';
      const toColor = colors[r.toId] || '#64748b';
      const routeEl = document.createElement('div');
      routeEl.className = 'settlement-route';
      routeEl.innerHTML = `
        <span class="settlement-user-badge" style="background-color: ${fromColor}">${escapeHtml(r.from)}</span>
        <span class="settlement-arrow-visual">¥${r.amount.toLocaleString()}</span>
        <span class="settlement-user-badge" style="background-color: ${toColor}">${escapeHtml(r.to)}</span>`;
      graphDiv.appendChild(routeEl);
    });
    container.appendChild(graphDiv);
  }

  // 履歴一覧
  const h4 = document.createElement('h4'); h4.style.cssText = 'font-size:13px; margin:14px 0 6px; color:var(--c-muted);'; h4.innerText = '支払い履歴（日付順）'; container.appendChild(h4);
  if (okaneList.length === 0) { container.innerHTML += '<div class="empty-state">履歴がありません</div>'; }
  
  okaneList.forEach(item => {
    const payerName = currentGroupData.memberNames[item.uid] || "不明";
    const catIcon = item.cat || ''; // カテゴリアイコン
    const dispDate = item.date ? `${item.date.slice(5)} ` : ''; // 日付文字列表示
    
    let splitHTML = '';
    if (item.splits) {
      const badges = Object.entries(item.splits).filter(([, a])=> a>0).map(([uid, amt]) => {
        return `<span class="split-detail-badge">${escapeHtml(currentGroupData.memberNames[uid])}: ¥${Math.round(amt)}</span>`;
      }).join('');
      splitHTML = `<div style="margin-top:4px;">${badges}</div>`;
    }

    const itemDiv = createListItemEl(item.id, `
      <span style="font-size:12px; font-weight:bold; color:var(--c-primary);">${dispDate}</span>
      <span>${catIcon} <strong>${escapeHtml(payerName)}</strong> ➔ <strong>¥${item.amount.toLocaleString()}</strong></span>
      <div style="font-size:12px; color:var(--c-muted); margin-top:2px;">${escapeHtml(item.text)}</div>
      ${splitHTML}
    `);
    container.appendChild(itemDiv);
  });
}

function calculateSettlementRoutes(diffMap, memberNames) {
  let debits = [], credits = [];
  Object.keys(diffMap).forEach(id => {
    const amt = diffMap[id];
    if (amt < -1) debits.push({ id, amount: Math.abs(amt) });
    else if (amt > 1) credits.push({ id, amount: amt });
  });
  const routes = []; let i = 0, j = 0;
  while (i < debits.length && j < credits.length) {
    const deb = debits[i], cre = credits[j]; const settled = Math.min(deb.amount, cre.amount);
    routes.push({ from: memberNames[deb.id], fromId: deb.id, to: memberNames[cre.id], toId: cre.id, amount: Math.round(settled) });
    deb.amount -= settled; cre.amount -= settled; if (deb.amount <= 1) i++; if (cre.amount <= 1) j++;
  }
  return routes;
}

/* ===================================================
    投票UI・割り勘補助UI
=================================================== */
function buildPollCard(type, title, desc, poll, placeholder) {
  const card = document.createElement('div'); card.className = 'poll-card';
  let optionsHTML = '';
  (poll.options||[]).forEach(opt => {
    const votes = opt.votes || []; const hasVoted = votes.includes(myUID);
    optionsHTML += `
      <div class="poll-option">
        <div class="poll-option-info"><div class="poll-option-name">${escapeHtml(opt.name)} (${votes.length}票)</div></div>
        <div class="poll-option-actions">
          <button class="btn btn-sm" data-action="vote" data-type="${type}" data-optid="${opt.id}">${hasVoted ? '' : '投票'}</button>
          <button class="btn btn-sm" style="background:#f59e0b;color:#fff;" data-action="finalize" data-type="${type}" data-optname="${escapeHtml(opt.name)}">確定</button>
        </div>
      </div>`;
  });
  card.innerHTML = `<div class="poll-title">${title}</div><div class="poll-desc">${desc}</div>${optionsHTML}<hr class="poll-separator">
    <div class="poll-row"><input type="text" id="input-poll-${type}" placeholder="${placeholder}"><button class="btn btn-primary btn-sm" data-action="add-option" data-type="${type}">追加</button></div>`;
  card.addEventListener('click', (e) => {
    const el = e.target.closest('[data-action]'); if (!el) return; const t = el.dataset.type;
    if (el.dataset.action === 'vote') voteStepOption(t, el.dataset.optid);
    if (el.dataset.action === 'finalize') setStepFinal(t, el.dataset.optname);
    if (el.dataset.action === 'add-option') addStepOption(t);
  });
  return card;
}
function buildConfirmedBanner(text, onReset) {
  const div = document.createElement('div'); div.className = 'confirmed-banner';
  div.innerHTML = `<span>${escapeHtml(text)}</span><button class="btn btn-sm btn-neutral">やり直す</button>`;
  div.querySelector('button').addEventListener('click', onReset); return div;
}

// 割り勘フォーム制御
document.getElementById('btn-split-even').addEventListener('click', () => setSplitMode('even'));
document.getElementById('btn-split-manual').addEventListener('click', () => setSplitMode('manual'));
function setSplitMode(mode) {
  splitMode = mode;
  document.getElementById('btn-split-even').classList.toggle('active', mode === 'even');
  document.getElementById('btn-split-manual').classList.toggle('active', mode === 'manual');
  document.getElementById('split-even-section').classList.toggle('visible', mode === 'even');
  document.getElementById('split-manual-section').classList.toggle('visible', mode === 'manual');
}
function renderSplitCheckboxes(memberNames, checkedIds = null) {
  const container = document.getElementById('split-member-checkboxes'); container.innerHTML = '';
  const ids = Object.keys(memberNames); const defaultChecked = checkedIds || ids;
  ids.forEach(uid => {
    const row = document.createElement('label'); row.className = 'split-member-row';
    row.innerHTML = `<input type="checkbox" data-uid="${uid}" ${defaultChecked.includes(uid) ? 'checked' : ''}> <span class="split-member-label">${escapeHtml(memberNames[uid])}</span>`;
    container.appendChild(row);
  });
}
function renderManualInputs(memberNames, existingSplits = {}) {
  const container = document.getElementById('split-manual-inputs'); container.innerHTML = '';
  Object.entries(memberNames).forEach(([uid, name]) => {
    const row = document.createElement('div'); row.className = 'split-manual-row';
    row.innerHTML = `<label>${escapeHtml(name)}</label><input type="number" data-uid="${uid}" value="${existingSplits[uid] || 0}"><span>円</span>`;
    container.appendChild(row);
  });
}

/* ===================================================
    アイテム追加・編集・保存処理
=================================================== */
document.getElementById('btn-add-item').addEventListener('click', openItemModal);
function openItemModal() {
  document.getElementById('edit-id').value = '';
  ['form-shiori','form-yukisaki','form-okane'].forEach(id => document.getElementById(id).style.display = 'none');
  const formMap = { 'しおり': 'form-shiori', '行き先': 'form-yukisaki', 'お金': 'form-okane' };
  document.getElementById(formMap[currentTab]).style.display = 'block';

  if (currentTab === 'しおり') { document.getElementById('input-shiori-text').value = ''; }
  if (currentTab === '行き先') { document.getElementById('input-spot-name').value = ''; }
  if (currentTab === 'お金') {
    document.getElementById('input-money-date').value = new Date().toISOString().substr(0,10);
    const sel = document.getElementById('input-money-name'); sel.innerHTML = '';
    Object.entries(currentGroupData?.memberNames || {}).forEach(([uid, name]) => {
      const opt = document.createElement('option'); opt.value = uid; opt.innerText = name; sel.appendChild(opt);
    });
    document.getElementById('input-money-amount').value = ''; document.getElementById('input-money-text').value = '';
    setSplitMode('even'); renderSplitCheckboxes(currentGroupData.memberNames); renderManualInputs(currentGroupData.memberNames);
  }
  document.getElementById('item-modal').classList.add('active');
}

function openEditItem(id) {
  openItemModal(); document.getElementById('edit-id').value = id;
  if (currentTab === 'しおり') {
    const item = currentGroupData.shiori.find(i => i.id === id);
    if (item) { document.getElementById('input-shiori-day').value = item.day; document.getElementById('input-time').value = item.time; document.getElementById('input-shiori-text').value = item.text; document.getElementById('input-shiori-cat').value = item.cat || 'move'; }
  } else if (currentTab === 'お金') {
    const item = currentGroupData.okane.find(i => i.id === id);
    if (item) {
      document.getElementById('input-money-date').value = item.date || '';
      document.getElementById('input-money-cat').value = item.cat || ' 食費';
      document.getElementById('input-money-name').value = item.uid;
      document.getElementById('input-money-amount').value = item.amount;
      document.getElementById('input-money-text').value = item.text;
      renderSplitCheckboxes(currentGroupData.memberNames, Object.keys(item.splits || {}));
      renderManualInputs(currentGroupData.memberNames, item.splits || {});
    }
  }
}

document.getElementById('btn-save-item').addEventListener('click', saveItem);
document.getElementById('btn-cancel-item').addEventListener('click', () => document.getElementById('item-modal').classList.remove('active'));

async function saveItem() {
  const idInput = document.getElementById('edit-id').value; const itemId = idInput || "item_" + Date.now();
  let shioriList = [...(currentGroupData.shiori || [])];
  let yukisakiList = [...(currentGroupData.yukisaki || [])];
  let okaneList = [...(currentGroupData.okane || [])];

  if (currentTab === 'しおり') {
    const day = document.getElementById('input-shiori-day').value; const time = document.getElementById('input-time').value;
    const text = document.getElementById('input-shiori-text').value.trim(); const cat = document.getElementById('input-shiori-cat').value;
    if (!text) return;
    if (idInput) { const i = shioriList.find(i => i.id === itemId); if(i) { i.day=day; i.time=time; i.text=text; i.cat=cat; } }
    else shioriList.push({ id: itemId, day, time, text, cat });
  } else if (currentTab === 'お金') {
    const date = document.getElementById('input-money-date').value;
    const cat = document.getElementById('input-money-cat').value;
    const uid = document.getElementById('input-money-name').value;
    const amount = parseInt(document.getElementById('input-money-amount').value) || 0;
    const text = document.getElementById('input-money-text').value.trim();
    
    let splits = {};
    if (splitMode === 'even') {
      const uids = [...document.querySelectorAll('#split-member-checkboxes input:checked')].map(cb => cb.dataset.uid);
      uids.forEach(u => splits[u] = amount / uids.length);
    } else {
      document.querySelectorAll('#split-manual-inputs .split-manual-row').forEach(row => {
        const inp = row.querySelector('input'); splits[inp.dataset.uid] = parseInt(inp.value) || 0;
      });
    }
    const entry = { id: itemId, date, cat, uid, amount, text, splits };
    if (idInput) { const idx = okaneList.findIndex(i => i.id === itemId); if(idx>=0) okaneList[idx] = entry; }
    else okaneList.push(entry);
  }

  showLoading(true);
  await updateDoc(doc(db, "groups", currentGroupId), { shiori: shioriList, yukisaki: yukisakiList, okane: okaneList });
  document.getElementById('item-modal').classList.remove('active'); showLoading(false);
}

async function deleteItem(id) {
  if (!confirm("削除しますか？")) return; showLoading(true);
  await updateDoc(doc(db, "groups", currentGroupId), {
    shiori: (currentGroupData.shiori||[]).filter(i => i.id !== id),
    okane: (currentGroupData.okane||[]).filter(i => i.id !== id)
  });
  showLoading(false);
}

/* ===================================================
    投票内部ロジック
=================================================== */
async function addStepOption(type) {
  const input = document.getElementById(`input-poll-${type}`); const name = input.value.trim(); if (!name) return;
  const pollKey = `${type}Poll`; const poll = currentGroupData[pollKey] || { options:[], deadline:"", finalValue:"" };
  if (!poll.options) poll.options = []; poll.options.push({ id: `opt_${Date.now()}`, name, votes: [] });
  await updateDoc(doc(db, "groups", currentGroupId), { [pollKey]: poll }); input.value = '';
}
async function voteStepOption(type, optId) {
  const pollKey = `${type}Poll`; const poll = { ...currentGroupData[pollKey] };
  poll.options = poll.options.map(opt => {
    if (opt.id !== optId) return opt; const votes = [...(opt.votes||[])]; const idx = votes.indexOf(myUID);
    if (idx >= 0) votes.splice(idx,1); else votes.push(myUID); return { ...opt, votes };
  });
  await updateDoc(doc(db, "groups", currentGroupId), { [pollKey]: poll });
}
async function setStepFinal(type, value) {
  const pollKey = `${type}Poll`; const poll = currentGroupData[pollKey] || { options:[], deadline:"", finalValue:"" };
  poll.finalValue = value; await updateDoc(doc(db, "groups", currentGroupId), { [pollKey]: poll });
}
async function resetStep(type) {
  const updates = {}; if (type === 'date') { updates['datePoll.finalValue'] = ""; updates['budgetPoll.finalValue'] = ""; }
  if (type === 'budget') { updates['budgetPoll.finalValue'] = ""; } await updateDoc(doc(db, "groups", currentGroupId), updates);
}

function createListItemEl(id, innerHTML) {
  const div = document.createElement('div'); div.className = 'list-item';
  div.innerHTML = `<div class="item-data">${innerHTML}</div>
    <div class="menu-container"><button class="btn-ghost" data-m2="${id}">⋮</button>
      <div class="dropdown-menu" id="m2-${id}"><div data-a2="edit" data-id="${id}">編集</div><div class="menu-delete" data-a2="delete" data-id="${id}">削除</div></div>
    </div>`;
  div.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-m2]'); const act = e.target.closest('[data-a2]');
    if (btn) { e.stopPropagation(); const m = document.getElementById(`m2-${btn.dataset.m2}`); const open = m.classList.contains('show'); closeAllMenus(); if(!open) m.classList.add('show'); }
    if (act) { e.stopPropagation(); if(act.dataset.a2==='edit') openEditItem(act.dataset.id); if(act.dataset.a2==='delete') deleteItem(act.dataset.id); }
  });
  return div;
}
document.addEventListener('click', closeAllMenus);
</script>
